name: Multi-Platform Plugin Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_STEP_DEBUG: true

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrender-dev libxrandr-dev libglu1-mesa-dev \
            mesa-common-dev libfreetype6-dev libfontconfig1-dev \
            libcurl4-openssl-dev libwebkit2gtk-4.1-dev libgtk-3-dev

      # CMake is pre-installed on GitHub runners. Manual setup step removed for stability.

      - name: Configure CMake (MacOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
            -G "Unix Makefiles"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      - name: Build Plugins (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -G "Unix Makefiles"

      - name: Build Plugins (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release

      - name: Upload Artifacts (MacOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: CyberDenoiser-Pro-MacOS
          path: build/CyberDenoiserPro_artefacts/Release/
          
      - name: Upload Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: CyberDenoiser-Pro-Windows
          path: build/CyberDenoiserPro_artefacts/Release/

      - name: Upload Artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: CyberDenoiser-Pro-Linux
          path: build/CyberDenoiserPro_artefacts/Release/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CyberDenoiser-Pro-MacOS
          path: Mac

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CyberDenoiser-Pro-Windows
          path: Win

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: CyberDenoiser-Pro-Linux
          path: Linux

      - name: Package ZIPs
        run: |
          zip -r Cyber-Denoiser-Pro-MacOS.zip Mac/
          zip -r Cyber-Denoiser-Pro-Windows.zip Win/
          zip -r Cyber-Denoiser-Pro-Linux.zip Linux/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Cyber-Denoiser-Pro-MacOS.zip
            Cyber-Denoiser-Pro-Windows.zip
            Cyber-Denoiser-Pro-Linux.zip
          body: |
            Cyber-Denoiser PRO v2.1
            
            - M-Series Hardware Optimization (vDSP)
            - Liquid Silk Animated GUI
            - Gated Clean Metering
            - Universal 2 (arm64 + x86_64) support for Mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
